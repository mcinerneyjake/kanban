name: CI

# Mirrors the local husky pre-commit gate (typecheck + lint + test) server-side,
# so every PR into main must pass the same checks before it can be merged — and
# the gate is enforced even if a contributor bypasses the local hook. CI runs the
# coverage variant so the per-layer thresholds in vitest.config.ts are enforced too.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least privilege: the gate only reads the checkout, never writes back.
permissions:
  contents: read

# Cancel superseded PR runs, but never cancel a run on main (each squash-merge
# push deserves its own complete gate).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:coverage
